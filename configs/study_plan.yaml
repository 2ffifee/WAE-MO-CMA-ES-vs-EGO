# Plan eksperymentów zgodny z raportem (kolejność faz)
study:
  name: wae_mo_cma_es_vs_ego

phases:
  - id: full_large_budget
    type: full_benchmark
    config: configs/full_benchmark_12h.yaml
    chunk_size: 5
    resume: true
    analyze:
      - type: analyze_results
        input: results/raw/full_comparison_12h_test.csv
      - type: statistics
        input: results/raw/full_comparison_12h_test.csv
      - type: cocopp
        data_dir: exdata/coco/full_12h_test
